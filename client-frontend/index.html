<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Player Validator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h2 {
            color: #333;
        }

        textarea {
            font-family: monospace;
            font-size: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid #ccc;
        }

        th, td {
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }

        .valid {
            background-color: #d4edda; /* green */
            color: #155724;
        }

        .invalid {
            background-color: #f8d7da; /* red */
            color: #721c24;
        }

        .button-container {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- Heading for the page -->
<h2>MLB Player Validator</h2>

<!-- Instructions for user -->
<p>Enter players in this format:</p>

<pre>
Shohei Ohtani, Dodgers
Mike Trout, Angels
Aaron Judge, Yankees
</pre>

<!-- Textarea where the user can input player data -->
<textarea id="input" rows="10" cols="40"></textarea>

<br><br>

<!-- Button that triggers the validation function when clicked -->
<div>
    <button onclick="validate()">Validate</button>
</div>

<!-- Heading for displaying the results -->
<h3>Results</h3>

<!-- Section to display the validation results -->
<table id="resultsTable">
    <thead>
        <tr>
            <th>Player Name</th>
            <th>Team</th>
            <th>Player Exists</th>
            <th>Team Correct</th>
        </tr>
    </thead>
    <tbody>
        <!-- Results will be inserted here -->
    </tbody>
</table>

<script>

async function validate(){

    // Get the raw input value from the textarea and split it by new lines
    let raw = document
        .getElementById("input")
        .value
        .split("\n");

    // Process each line of input to separate the player name and team
    let players = raw.map(line => {

        // Split each line by comma and space to separate name and team
        let parts = line.split(", ")

        // Return an object with the player name and team
        return {
            name: parts[0],
            team: parts[1]
        }

    });

    // Make an asynchronous POST request to the server with the players' data
    let response = await fetch(
        "http://localhost:5000/check_players",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            // Send the players data as a JSON string in the body of the request
            body: JSON.stringify({
                players: players
            })
        }
    );

    // Wait for the server response and convert it to JSON format
    let data = await response.json();

    // console.log("Server Response:", data);

    // Get the table body elemnt to insert results
    let resultsTableBody = document.getElementById("resultsTable").getElementsByTagName('tbody')[0];

    // Clear previous results in the table
    resultsTableBody.innerHTML = '';

    // Loop through the validation data and display results
    data.results.forEach(player => {
        let row = resultsTableBody.insertRow();

        let nameCell = row.insertCell(0);
        nameCell.textContent = player.name;

        let teamCell = row.insertCell(1);
        teamCell.textContent = player.team;

        let existsCell = row.insertCell(2);
        existsCell.textContent = player.player_exists ? "Yes" : "No";

        let teamCorrectCell = row.insertCell(3);
        teamCorrectCell.textContent = player.team_correct ? "Yes" : "No";

        // Apply validation result colour based on team correctness
        if (player.team_correct) {
            row.classList.add("valid");
        } else {
            row.classList.add("invalid");
        }
    });
}

</script>
</body>
</html>
